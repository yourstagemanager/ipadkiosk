<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Kiosk Editor</title>
<style>
:root {
  --bg: #0f0f23;
  --surface: #1a1a2e;
  --surface2: #16213e;
  --accent: #e94560;
  --accent2: #0f3460;
  --text: #eee;
  --text-dim: #888;
  --radius: 12px;
  --gap: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* --- Header --- */
.header {
  background: var(--surface);
  padding: 16px var(--gap);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.header h1 { font-size: 18px; font-weight: 600; }
.status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #555;
  display: inline-block;
  margin-right: 8px;
  transition: background 0.3s;
}
.status-dot.connected { background: #4ade80; }
.status-dot.saving { background: #facc15; }
.status-dot.error { background: #ef4444; }

/* --- Tabs --- */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  overflow-x: auto;
}
.tab {
  flex: 1;
  padding: 12px 8px;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
}
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* --- Panels --- */
.panel { display: none; padding: var(--gap); }
.panel.active { display: block; }

/* --- Form elements --- */
.field { margin-bottom: var(--gap); }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
textarea, input[type="text"], input[type="number"], select {
  width: 100%;
  padding: 12px;
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
  -webkit-appearance: none;
}
textarea { resize: vertical; min-height: 120px; line-height: 1.5; }
textarea:focus, input:focus, select:focus {
  outline: none;
  border-color: var(--accent);
}
select { padding-right: 32px; }

/* --- Rich text editor --- */
.rte-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 8px;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.1);
  border-bottom: none;
  border-radius: var(--radius) var(--radius) 0 0;
}
.rte-btn {
  width: 36px;
  height: 36px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  background: var(--surface2);
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.rte-btn:active, .rte-btn.active { background: var(--accent); color: #fff; }
.rte-btn.size-btn { width: auto; padding: 0 10px; font-size: 12px; }
.rte-sep { width: 1px; background: rgba(255,255,255,0.1); margin: 4px 4px; }
.rte-size-label { font-size: 11px; color: var(--text-dim); padding: 0 6px; display: flex; align-items: center; }
.rte-color-input {
  width: 36px;
  height: 36px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  padding: 3px;
  cursor: pointer;
  background: var(--surface2);
}
.rte-editor {
  width: 100%;
  min-height: 150px;
  padding: 12px;
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 0 0 var(--radius) var(--radius);
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
  line-height: 1.5;
  outline: none;
  overflow-y: auto;
  word-wrap: break-word;
}
.rte-editor:focus { border-color: var(--accent); }
.rte-editor-sm { min-height: 60px; }
.save-msg-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.save-msg-row input { flex: 1; min-width: 0; }
.save-msg-row .btn { width: auto; padding: 10px 18px; font-size: 14px; white-space: nowrap; }
.btn-edit { background: transparent; color: var(--text-dim); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
.saved-msg-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; gap: 8px; }
.saved-msg-item .msg-info { flex: 1; min-width: 0; }
.saved-msg-item .msg-label { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.saved-msg-item .msg-date { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.saved-msg-item .msg-actions { display: flex; gap: 6px; flex-shrink: 0; }
.btn-load { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-del { background: transparent; color: var(--text-dim); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; }

.color-row {
  display: flex;
  gap: 12px;
  align-items: center;
}
.color-row input[type="color"] {
  width: 48px;
  height: 48px;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  background: var(--surface2);
  padding: 4px;
}
.color-row input[type="text"] { flex: 1; }

/* --- Buttons --- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 24px;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  transition: opacity 0.2s;
}
.btn:active { opacity: 0.7; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
.btn + .btn { margin-top: 10px; }

/* --- Image upload --- */
.image-upload-area {
  border: 2px dashed rgba(255,255,255,0.15);
  border-radius: var(--radius);
  padding: 32px;
  text-align: center;
  color: var(--text-dim);
  cursor: pointer;
  transition: border-color 0.2s;
}
.image-upload-area:active { border-color: var(--accent); }
.image-preview {
  margin-top: 12px;
  border-radius: var(--radius);
  overflow: hidden;
}
.image-preview img {
  width: 100%;
  max-height: 200px;
  object-fit: contain;
  display: block;
}

/* --- Preview card (iPad 1st gen: 1024x768) --- */
.preview-card {
  background: #000;
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: var(--gap);
  position: relative;
  width: 100%;
  padding-bottom: 75%; /* 4:3 aspect ratio (768/1024) */
}
.preview-card .preview-frame {
  position: absolute;
  top: 0;
  left: 0;
  width: 1024px;
  height: 768px;
  border: none;
  transform-origin: top left;
}
.preview-card .preview-msg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
  word-break: break-word;
  white-space: pre-line;
}
.preview-info {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: var(--gap);
  padding: 0 4px;
}

/* --- Log --- */
.log-entry {
  display: flex;
  justify-content: space-between;
  padding: 10px 12px;
  background: var(--surface);
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 13px;
}
.log-entry .time { color: var(--text-dim); font-variant-numeric: tabular-nums; }
.log-entry .event { color: var(--text); font-weight: 500; }
.log-empty {
  text-align: center;
  color: var(--text-dim);
  padding: 40px;
}

/* --- Toast --- */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface);
  color: var(--text);
  padding: 12px 24px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  transition: transform 0.3s ease;
  z-index: 200;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-left: 4px solid #4ade80; }
.toast.error { border-left: 4px solid #ef4444; }

/* --- Loader overlay --- */
.loader {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 300;
}
.loader.hidden { display: none; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Loader -->
<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<!-- Header -->
<div class="header">
  <div style="display:flex;align-items:center;">
    <span class="status-dot" id="statusDot"></span>
    <h1>Kiosk Editor</h1>
  </div>
  <span id="lastSaved" style="font-size:12px;color:var(--text-dim);"></span>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" data-tab="content">Content</button>
  <button class="tab" data-tab="image">Image</button>
  <button class="tab" data-tab="preview">Preview</button>
  <button class="tab" data-tab="log">Activity</button>
</div>

<!-- Content Panel -->
<div class="panel active" id="panel-content">
  <div class="field">
    <label>Display Message</label>
    <div class="rte-toolbar">
      <button class="rte-btn" onclick="rteCmd('bold')" title="Bold"><b>B</b></button>
      <button class="rte-btn" onclick="rteCmd('italic')" title="Italic"><i>I</i></button>
      <button class="rte-btn" onclick="rteCmd('underline')" title="Underline"><u>U</u></button>
      <div class="rte-sep"></div>
      <button class="rte-btn size-btn" onclick="rteSetSize('24px')" title="Small">S</button>
      <button class="rte-btn size-btn" onclick="rteSetSize('48px')" title="Medium">M</button>
      <button class="rte-btn size-btn" onclick="rteSetSize('72px')" title="Large">L</button>
      <button class="rte-btn size-btn" onclick="rteSetSize('96px')" title="Extra Large">XL</button>
      <div class="rte-sep"></div>
      <input type="color" class="rte-color-input" id="rteColor" value="#FFFFFF" onmousedown="saveColorRange('message')" onchange="rteApplyColor(this.value)" title="Text color">
      <div class="rte-sep"></div>
      <button class="rte-btn" onclick="rteCmd('removeFormat')" title="Clear formatting" style="font-size:12px;">CLR</button>
    </div>
    <div class="rte-editor" id="message" contenteditable="true" data-placeholder="Enter your kiosk message..."></div>
  </div>
  <div class="field">
    <label>Saved Messages</label>
    <div class="save-msg-row">
      <input type="text" id="saveMsgLabel" class="input" placeholder="Name this message..." maxlength="60">
      <button class="btn btn-secondary" id="saveMsgBtn" onclick="saveCurrentMessage()">Save</button>
      <button class="btn btn-secondary" id="cancelEditBtn" onclick="cancelEditMessage()" style="display:none;">Cancel</button>
    </div>
    <div id="savedMessagesList"><div style="color:var(--text-dim);font-size:13px;padding:4px 0;">No saved messages yet</div></div>
  </div>
  <div class="field">
    <label>Header</label>
    <div class="rte-toolbar">
      <button class="rte-btn" onclick="rteCmd('bold','headerText')" title="Bold"><b>B</b></button>
      <button class="rte-btn" onclick="rteCmd('italic','headerText')" title="Italic"><i>I</i></button>
      <button class="rte-btn" onclick="rteCmd('underline','headerText')" title="Underline"><u>U</u></button>
      <div class="rte-sep"></div>
      <button class="rte-btn size-btn" onclick="rteSetSize('14px','headerText')" title="Small">S</button>
      <button class="rte-btn size-btn" onclick="rteSetSize('20px','headerText')" title="Medium">M</button>
      <button class="rte-btn size-btn" onclick="rteSetSize('28px','headerText')" title="Large">L</button>
      <button class="rte-btn size-btn" onclick="rteSetSize('36px','headerText')" title="Extra Large">XL</button>
      <div class="rte-sep"></div>
      <input type="color" class="rte-color-input" value="#FFFFFF" onmousedown="saveColorRange('headerText')" onchange="rteApplyColor(this.value,'headerText')" title="Text color">
      <div class="rte-sep"></div>
      <button class="rte-btn" onclick="rteCmd('removeFormat','headerText')" title="Clear formatting" style="font-size:12px;">CLR</button>
    </div>
    <div class="rte-editor rte-editor-sm" id="headerText" contenteditable="true" data-placeholder="Header text..."></div>
  </div>
  <div class="field">
    <label>Footer</label>
    <div class="rte-toolbar">
      <button class="rte-btn" onclick="rteCmd('bold','footerText')" title="Bold"><b>B</b></button>
      <button class="rte-btn" onclick="rteCmd('italic','footerText')" title="Italic"><i>I</i></button>
      <button class="rte-btn" onclick="rteCmd('underline','footerText')" title="Underline"><u>U</u></button>
      <div class="rte-sep"></div>
      <button class="rte-btn size-btn" onclick="rteSetSize('14px','footerText')" title="Small">S</button>
      <button class="rte-btn size-btn" onclick="rteSetSize('20px','footerText')" title="Medium">M</button>
      <button class="rte-btn size-btn" onclick="rteSetSize('28px','footerText')" title="Large">L</button>
      <button class="rte-btn size-btn" onclick="rteSetSize('36px','footerText')" title="Extra Large">XL</button>
      <div class="rte-sep"></div>
      <input type="color" class="rte-color-input" value="#FFFFFF" onmousedown="saveColorRange('footerText')" onchange="rteApplyColor(this.value,'footerText')" title="Text color">
      <div class="rte-sep"></div>
      <button class="rte-btn" onclick="rteCmd('removeFormat','footerText')" title="Clear formatting" style="font-size:12px;">CLR</button>
    </div>
    <div class="rte-editor rte-editor-sm" id="footerText" contenteditable="true" data-placeholder="Footer text..."></div>
  </div>
  <div class="field">
    <label>Background Color</label>
    <div class="color-row">
      <input type="color" id="bgColorPicker" value="#1a1a2e">
      <input type="text" id="bgColor" value="#1a1a2e" maxlength="7">
    </div>
  </div>
  <div class="field">
    <label>Font Family</label>
    <select id="fontFamily">
      <option value="Helvetica, Arial, sans-serif">Helvetica</option>
      <option value="Georgia, 'Times New Roman', serif">Georgia</option>
      <option value="'Courier New', Courier, monospace">Courier</option>
      <option value="'Trebuchet MS', sans-serif">Trebuchet</option>
      <option value="Verdana, Geneva, sans-serif">Verdana</option>
      <option value="Palatino, 'Book Antiqua', serif">Palatino</option>
    </select>
  </div>
  <div class="field">
    <label>Refresh Interval (seconds)</label>
    <input type="number" id="refreshInterval" min="5" max="3600" value="300">
  </div>
  <button class="btn btn-primary" onclick="save()">Save &amp; Publish</button>
  <button class="btn btn-secondary" onclick="forceRefresh()">Force iPad Refresh</button>
</div>

<!-- Image Panel -->
<div class="panel" id="panel-image">
  <div class="field">
    <label>Image</label>
    <div class="image-upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div>Tap to upload an image</div>
      <div style="font-size:12px;margin-top:8px;">JPG, PNG supported</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <div class="image-preview" id="imagePreview" style="display:none">
      <img id="previewImg" src="" alt="Preview">
    </div>
  </div>
  <div class="field">
    <label>Or Paste Image URL</label>
    <input type="text" id="imageUrl" placeholder="https://...">
  </div>
  <div class="field">
    <label>Image Position</label>
    <select id="imagePosition">
      <option value="above">Above text</option>
      <option value="below">Below text</option>
      <option value="left">Left of text</option>
      <option value="right">Right of text</option>
      <option value="background">Background</option>
    </select>
  </div>
  <div class="field">
    <label>Image Max Width (%)</label>
    <input type="number" id="imageMaxWidth" min="10" max="100" value="60">
  </div>
  <div class="field">
    <label>Watermark Opacity: <span id="watermarkOpacityVal">30</span>%</label>
    <input type="range" id="watermarkOpacity" min="0" max="100" value="30" style="width:100%;margin-top:6px;" oninput="document.getElementById('watermarkOpacityVal').textContent=this.value">
  </div>
  <button class="btn btn-primary" onclick="save()">Save &amp; Publish</button>
  <button class="btn btn-secondary" onclick="clearImage()">Remove Image</button>
</div>

<!-- Preview Panel -->
<div class="panel" id="panel-preview">
  <div class="preview-card" id="previewCard">
    <div class="preview-msg" id="previewMsg">Save content first, then refresh preview</div>
  </div>
  <div class="preview-info">
    <span>iPad 1st Gen (1024 x 768)</span>
    <span id="previewScale"></span>
  </div>
  <button class="btn btn-secondary" onclick="refreshPreview()">Refresh Preview</button>
</div>

<!-- Activity Log Panel -->
<div class="panel" id="panel-log">
  <div id="logStatus"></div>
  <div id="logList">
    <div class="log-empty">Loading activity log...</div>
  </div>
  <button class="btn btn-secondary" onclick="loadLog()" style="margin-top:var(--gap);">Refresh</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// --- State ---
var state = {};
var dirty = false;

// --- Tab switching ---
document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');

    if (tab.dataset.tab === 'preview') refreshPreview();
    if (tab.dataset.tab === 'log') loadLog();
  });
});

// --- Rich text editor ---
function rteCmd(cmd, targetId) {
  document.execCommand(cmd, false, null);
  document.getElementById(targetId || 'message').focus();
  updateLivePreview();
}

function rteSetSize(size, targetId) {
  var sel = window.getSelection();
  if (!sel.rangeCount || sel.isCollapsed) return;

  document.execCommand('fontSize', false, '7');

  var editor = document.getElementById(targetId || 'message');
  var fonts = editor.querySelectorAll('font[size="7"]');
  for (var i = 0; i < fonts.length; i++) {
    var span = document.createElement('span');
    span.style.fontSize = size;
    span.innerHTML = fonts[i].innerHTML;
    fonts[i].parentNode.replaceChild(span, fonts[i]);
  }
  editor.focus();
  updateLivePreview();
}

var _savedColorRange = {};

function saveColorRange(targetId) {
  var id = targetId || 'message';
  var sel = window.getSelection();
  if (sel && sel.rangeCount > 0 && !sel.isCollapsed) {
    _savedColorRange[id] = sel.getRangeAt(0).cloneRange();
  }
}

function rteApplyColor(color, targetId) {
  var id = targetId || 'message';
  if (_savedColorRange[id]) {
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(_savedColorRange[id]);
    delete _savedColorRange[id];
  }
  document.execCommand('foreColor', false, color);
  updateLivePreview();
}

// --- Color picker sync ---
document.getElementById('bgColorPicker').addEventListener('input', function() {
  document.getElementById('bgColor').value = this.value;
  updateLivePreview();
});
document.getElementById('bgColor').addEventListener('input', function() {
  try { document.getElementById('bgColorPicker').value = this.value; } catch(e) {}
  updateLivePreview();
});

// --- Live preview listeners ---
['panel-content', 'panel-image'].forEach(function(id) {
  var panel = document.getElementById(id);
  panel.addEventListener('input', updateLivePreview);
  panel.addEventListener('change', updateLivePreview);
});

// --- File upload ---
document.getElementById('fileInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;

  // Show local preview
  var reader = new FileReader();
  reader.onload = function(ev) {
    document.getElementById('previewImg').src = ev.target.result;
    document.getElementById('imagePreview').style.display = 'block';
    document.getElementById('uploadArea').style.display = 'none';

    // Upload to Drive
    setStatus('saving');
    showToast('Uploading image...');

    google.script.run
      .withSuccessHandler(function(result) {
        document.getElementById('imageUrl').value = result;
        setStatus('connected');
        showToast('Image uploaded!', 'success');
      })
      .withFailureHandler(function(err) {
        setStatus('error');
        showToast('Upload failed: ' + err.message, 'error');
      })
      .clientUploadImage(ev.target.result.split(',')[1], file.name);
  };
  reader.readAsDataURL(file);
});

function clearImage() {
  document.getElementById('imageUrl').value = '';
  document.getElementById('imagePreview').style.display = 'none';
  document.getElementById('uploadArea').style.display = 'block';
  document.getElementById('previewImg').src = '';
  save();
}

// --- Load data ---
function load() {
  showLoader(true);
  google.script.run
    .withSuccessHandler(function(data) {
      state = data;
      populateFields(data);
      setStatus('connected');
      showLoader(false);
      loadSavedMessages();
    })
    .withFailureHandler(function(err) {
      setStatus('error');
      showLoader(false);
      showToast('Failed to load: ' + err.message, 'error');
    })
    .clientGetData();
}

var _previewAssets = { watermarkUrl: '', watermarkUrl2: '', fontColor: '#FFFFFF' };
var _previewDebounce = null;

function populateFields(d) {
  document.getElementById('message').innerHTML = d.message || '';
  document.getElementById('headerText').innerHTML = d.headerText || '';
  document.getElementById('footerText').innerHTML = d.footerText || '';
  document.getElementById('fontFamily').value = d.fontFamily || 'Helvetica, Arial, sans-serif';
  document.getElementById('bgColor').value = d.bgColor || '#000000';
  document.getElementById('refreshInterval').value = d.refreshInterval || '300';
  document.getElementById('imageUrl').value = d.imageUrl || '';
  document.getElementById('imagePosition').value = d.imagePosition || 'above';
  document.getElementById('imageMaxWidth').value = d.imageMaxWidth || '60';
  var opacityPct = Math.round((parseFloat(d.watermarkOpacity) || 0.30) * 100);
  document.getElementById('watermarkOpacity').value = opacityPct;
  document.getElementById('watermarkOpacityVal').textContent = opacityPct;
  _previewAssets.watermarkUrl = d.watermarkUrl || '';
  _previewAssets.watermarkUrl2 = d.watermarkUrl2 || '';
  _previewAssets.fontColor = d.fontColor || '#FFFFFF';

  try {
    document.getElementById('bgColorPicker').value = d.bgColor || '#000000';
  } catch(e) {}

  if (d.imageUrl) {
    document.getElementById('previewImg').src = d.imageUrl;
    document.getElementById('imagePreview').style.display = 'block';
    document.getElementById('uploadArea').style.display = 'none';
  }

  if (d.lastUpdated) {
    var dt = new Date(d.lastUpdated);
    document.getElementById('lastSaved').textContent = 'Updated ' + formatTime(dt);
  }
}

// --- Save data ---
function save() {
  var fields = {
    message: document.getElementById('message').innerHTML,
    headerText: document.getElementById('headerText').innerHTML,
    footerText: document.getElementById('footerText').innerHTML,
    fontFamily: document.getElementById('fontFamily').value,
    bgColor: document.getElementById('bgColor').value,
    refreshInterval: document.getElementById('refreshInterval').value,
    imageUrl: document.getElementById('imageUrl').value,
    imagePosition: document.getElementById('imagePosition').value,
    imageMaxWidth: document.getElementById('imageMaxWidth').value,
    watermarkOpacity: (parseFloat(document.getElementById('watermarkOpacity').value) / 100).toFixed(2)
  };

  setStatus('saving');

  google.script.run
    .withSuccessHandler(function() {
      setStatus('connected');
      showToast('Published!', 'success');
      var now = new Date();
      document.getElementById('lastSaved').textContent = 'Updated ' + formatTime(now);
    })
    .withFailureHandler(function(err) {
      setStatus('error');
      showToast('Save failed: ' + err.message, 'error');
    })
    .clientSaveData(fields);
}

// --- Preview ---
function buildPreviewHtml() {
  var message = document.getElementById('message').innerHTML;
  var headerText = document.getElementById('headerText').innerHTML;
  var footerText = document.getElementById('footerText').innerHTML;
  var bgColor = document.getElementById('bgColor').value || '#000000';
  var fontFamily = document.getElementById('fontFamily').value || 'Helvetica, Arial, sans-serif';
  var imageUrl = document.getElementById('imageUrl').value;
  var imagePosition = document.getElementById('imagePosition').value || 'above';
  var imageMaxWidth = document.getElementById('imageMaxWidth').value || '60';
  var watermarkOpacity = (parseFloat(document.getElementById('watermarkOpacity').value) / 100).toFixed(2);
  var wUrl = _previewAssets.watermarkUrl;
  var wUrl2 = _previewAssets.watermarkUrl2;
  var fontColor = _previewAssets.fontColor;
  var isHorizontal = imageUrl && (imagePosition === 'left' || imagePosition === 'right');

  var watermarkHtml = '';
  if (wUrl || wUrl2) {
    watermarkHtml = '<div class="watermark-wrap">';
    if (wUrl) watermarkHtml += '<div class="watermark-pos watermark-pos-1"><img class="watermark" src="' + wUrl + '" alt=""></div>';
    if (wUrl2) watermarkHtml += '<div class="watermark-pos watermark-pos-2"><img class="watermark" src="' + wUrl2 + '" alt=""></div>';
    watermarkHtml += '</div>';
  }
  var imageHtml = imageUrl ? '<img class="kiosk-image" src="' + imageUrl + '">' : '';
  var messageHtml = '<div class="message">' + (message || '') + '</div>';
  var contentHtml = '';
  if (isHorizontal) {
    var cells = imagePosition === 'left'
      ? '<div class="image-cell">' + imageHtml + '</div><div class="text-cell">' + messageHtml + '</div>'
      : '<div class="text-cell">' + messageHtml + '</div><div class="image-cell">' + imageHtml + '</div>';
    contentHtml = '<div class="content-wrap">' + cells + '</div>';
  } else if (imageUrl && imagePosition === 'background') {
    contentHtml = '<div class="message" style="background-image:url(\'' + imageUrl + '\');background-size:cover;background-position:center;padding:40px;min-height:100%;">' + (message || '') + '</div>';
  } else if (imageUrl && imagePosition === 'above') {
    contentHtml = imageHtml + messageHtml;
  } else if (imageUrl) {
    contentHtml = messageHtml + imageHtml;
  } else {
    contentHtml = messageHtml;
  }

  return '<!DOCTYPE html><html><head><meta charset="utf-8"><style>' +
    '* { margin:0; padding:0; box-sizing:border-box; }' +
    'html,body { width:100%; height:100%; overflow:hidden; }' +
    'body { background-color:' + bgColor + '; color:' + fontColor + '; font-family:' + fontFamily + '; }' +
    '.watermark-wrap { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }' +
    '.watermark-pos { position:absolute; left:0; width:100%; text-align:center; pointer-events:none; }' +
    '.watermark-pos-1 { top:18%; } .watermark-pos-1 .watermark { max-width:60%; }' +
    '.watermark-pos-2 { top:58%; }' +
    '.watermark { max-width:70%; max-height:35%; opacity:' + watermarkOpacity + '; filter:grayscale(100%); pointer-events:none; }' +
    '.header-bar { position:absolute; top:0; left:0; width:100%; text-align:center; font-size:22px; font-weight:300; letter-spacing:1px; line-height:1.4; padding:20px 40px; z-index:2; }' +
    '.footer-bar { position:absolute; bottom:0; left:0; width:100%; text-align:center; font-size:18px; font-weight:300; letter-spacing:1px; line-height:1.4; padding:20px 40px; z-index:2; }' +
    '.outer { display:table; width:100%; height:100%; position:relative; z-index:1; }' +
    '.inner { display:table-cell; vertical-align:middle; text-align:center; padding:80px 40px; }' +
    '.message { font-size:64px; line-height:1.3; word-wrap:break-word; position:relative; z-index:1; }' +
    '.kiosk-image { max-width:' + imageMaxWidth + '%; max-height:50%; margin:20px auto; display:block; }' +
    (isHorizontal ? '.content-wrap{display:table;width:100%;} .image-cell,.text-cell{display:table-cell;vertical-align:middle;width:50%;padding:20px;} .kiosk-image{max-width:90%;max-height:80%;}' : '') +
    '</style></head><body>' +
    watermarkHtml +
    (headerText ? '<div class="header-bar">' + headerText + '</div>' : '') +
    '<div class="outer"><div class="inner">' + contentHtml + '</div></div>' +
    (footerText ? '<div class="footer-bar">' + footerText + '</div>' : '') +
    '</body></html>';
}

function refreshPreview() {
  var card = document.getElementById('previewCard');
  var cardWidth = card.offsetWidth;
  var scale = cardWidth / 1024;

  var oldMsg = card.querySelector('.preview-msg');
  if (oldMsg) oldMsg.remove();

  var iframe = card.querySelector('.preview-frame');
  if (!iframe) {
    iframe = document.createElement('iframe');
    iframe.className = 'preview-frame';
    iframe.style.width = '1024px';
    iframe.style.height = '768px';
    iframe.style.border = 'none';
    card.appendChild(iframe);
  }
  iframe.style.transform = 'scale(' + scale + ')';
  iframe.style.webkitTransform = 'scale(' + scale + ')';
  iframe.srcdoc = buildPreviewHtml();

  var scaleLabel = document.getElementById('previewScale');
  if (scaleLabel) scaleLabel.textContent = Math.round(scale * 100) + '% scale';
}

function updateLivePreview() {
  clearTimeout(_previewDebounce);
  _previewDebounce = setTimeout(function() {
    var iframe = document.querySelector('#previewCard .preview-frame');
    if (iframe) iframe.srcdoc = buildPreviewHtml();
  }, 250);
}

// --- Force Refresh ---
function forceRefresh() {
  // Temporarily set refresh to 5s so the iPad picks up changes fast,
  // then revert to the user's chosen interval after 30s
  var userInterval = document.getElementById('refreshInterval').value;
  var tempFields = {
    message: document.getElementById('message').innerHTML,
    headerText: document.getElementById('headerText').innerHTML,
    footerText: document.getElementById('footerText').innerHTML,
    fontFamily: document.getElementById('fontFamily').value,
    bgColor: document.getElementById('bgColor').value,
    refreshInterval: '5',
    imageUrl: document.getElementById('imageUrl').value,
    imagePosition: document.getElementById('imagePosition').value,
    imageMaxWidth: document.getElementById('imageMaxWidth').value,
    watermarkOpacity: (parseFloat(document.getElementById('watermarkOpacity').value) / 100).toFixed(2)
  };

  setStatus('saving');
  showToast('Pushing update (5s refresh)...');

  google.script.run
    .withSuccessHandler(function() {
      setStatus('connected');
      showToast('iPad will refresh within 5s', 'success');

      // Revert to normal interval after 30 seconds
      setTimeout(function() {
        var revertFields = Object.assign({}, tempFields);
        revertFields.refreshInterval = userInterval;
        google.script.run
          .withSuccessHandler(function() {
            showToast('Refresh interval restored to ' + userInterval + 's', 'success');
          })
          .withFailureHandler(function() {})
          .clientSaveData(revertFields);
      }, 30000);
    })
    .withFailureHandler(function(err) {
      setStatus('error');
      showToast('Failed: ' + err.message, 'error');
    })
    .clientSaveData(tempFields);
}

// --- Saved Messages ---
var _savedMessages = [];
var _editingId = null;

function saveCurrentMessage() {
  var label = document.getElementById('saveMsgLabel').value.trim();
  if (!label) { showToast('Enter a name for this message', 'error'); return; }
  var content = document.getElementById('message').innerHTML;
  if (_editingId) {
    google.script.run
      .withSuccessHandler(function(result) {
        cancelEditMessage();
        showToast('Message updated!', 'success');
        renderSavedMessages(result.messages);
      })
      .withFailureHandler(function(err) { showToast('Update failed: ' + err.message, 'error'); })
      .clientUpdateMessage({ id: _editingId, label: label, content: content });
  } else {
    google.script.run
      .withSuccessHandler(function(result) {
        document.getElementById('saveMsgLabel').value = '';
        showToast('Message saved!', 'success');
        renderSavedMessages(result.messages);
      })
      .withFailureHandler(function(err) { showToast('Save failed: ' + err.message, 'error'); })
      .clientSaveMessage({ label: label, content: content });
  }
}

function editSavedMessage(id) {
  var msg = null;
  for (var i = 0; i < _savedMessages.length; i++) { if (_savedMessages[i].id === id) { msg = _savedMessages[i]; break; } }
  if (!msg) return;
  _editingId = id;
  document.getElementById('saveMsgLabel').value = msg.label;
  document.getElementById('message').innerHTML = msg.content;
  document.getElementById('saveMsgBtn').textContent = 'Update';
  document.getElementById('cancelEditBtn').style.display = '';
  updateLivePreview();
  document.getElementById('saveMsgLabel').focus();
  showToast('Editing: ' + msg.label, 'success');
}

function cancelEditMessage() {
  _editingId = null;
  document.getElementById('saveMsgLabel').value = '';
  document.getElementById('saveMsgBtn').textContent = 'Save';
  document.getElementById('cancelEditBtn').style.display = 'none';
}

function loadSavedMessages() {
  google.script.run
    .withSuccessHandler(function(messages) { renderSavedMessages(messages); })
    .clientGetMessages();
}

function renderSavedMessages(messages) {
  _savedMessages = messages || [];
  var list = document.getElementById('savedMessagesList');
  if (!_savedMessages.length) {
    list.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:4px 0;">No saved messages yet</div>';
    return;
  }
  list.innerHTML = _savedMessages.slice().reverse().map(function(m) {
    var safeLabel = m.label.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return '<div class="saved-msg-item">' +
      '<div class="msg-info"><div class="msg-label">' + safeLabel + '</div>' +
      '<div class="msg-date">' + formatTime(new Date(m.savedAt)) + '</div></div>' +
      '<div class="msg-actions">' +
      '<button class="btn-load" onclick="loadSavedMessage(\'' + m.id + '\')">Load</button>' +
      '<button class="btn-edit" onclick="editSavedMessage(\'' + m.id + '\')">Edit</button>' +
      '<button class="btn-del" onclick="deleteSavedMessage(\'' + m.id + '\')">✕</button>' +
      '</div></div>';
  }).join('');
}

function loadSavedMessage(id) {
  var msg = null;
  for (var i = 0; i < _savedMessages.length; i++) { if (_savedMessages[i].id === id) { msg = _savedMessages[i]; break; } }
  if (!msg) return;
  if (confirm('Load "' + msg.label + '"? Your current message will be replaced.')) {
    document.getElementById('message').innerHTML = msg.content;
    updateLivePreview();
    showToast('Loaded: ' + msg.label, 'success');
  }
}

function deleteSavedMessage(id) {
  var msg = null;
  for (var i = 0; i < _savedMessages.length; i++) { if (_savedMessages[i].id === id) { msg = _savedMessages[i]; break; } }
  if (!msg || !confirm('Delete "' + msg.label + '"?')) return;
  google.script.run
    .withSuccessHandler(function(result) { showToast('Deleted', 'success'); renderSavedMessages(result.messages); })
    .withFailureHandler(function(err) { showToast('Delete failed: ' + err.message, 'error'); })
    .clientDeleteMessage(id);
}

// --- Activity Log ---
function loadLog() {
  document.getElementById('logList').innerHTML = '<div class="log-empty">Loading...</div>';

  google.script.run
    .withSuccessHandler(function(entries) {
      var statusHtml = '';
      var html = '';

      if (!entries || entries.length === 0) {
        html = '<div class="log-empty">No activity yet. The kiosk will log each time it loads or sends a heartbeat.</div>';
      } else {
        // Status card — find most recent heartbeat or page load
        var lastSeen = null;
        for (var h = 0; h < entries.length; h++) {
          if (entries[h].event === 'heartbeat' || entries[h].event === 'preview-load') {
            lastSeen = entries[h]; break;
          }
        }
        var lastDt = new Date(lastSeen ? lastSeen.timestamp : entries[0].timestamp);
        var ageMs = Date.now() - lastDt.getTime();
        var isOnline = lastSeen && ageMs < 120000;
        statusHtml =
          '<div style="background:var(--surface2);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;">' +
          '<span style="font-size:22px;">' + (isOnline ? '🟢' : '🔴') + '</span>' +
          '<div><div style="font-weight:600;">' + (isOnline ? 'Online' : 'Offline') + '</div>' +
          '<div style="font-size:12px;color:var(--text-dim);">Last seen ' + formatTime(lastDt) + '</div></div>' +
          '</div>';

        // Only show editor saves and errors — heartbeats/page loads used for status only
        var logEntries = [];
        for (var i = 0; i < entries.length; i++) {
          var ev = entries[i].event;
          if (ev !== 'heartbeat' && ev !== 'preview-load') logEntries.push(entries[i]);
        }

        var show = logEntries.slice(0, 50);
        if (show.length === 0) {
          html = '<div class="log-empty">No saves yet. Editor saves will appear here.</div>';
        } else {
          for (var j = 0; j < show.length; j++) {
            var g = show[j];
            var dt = new Date(g.timestamp);
            var label, detail = '';
            if (g.event === 'editor-save') {
              label = '💾 editor save';
              if (g.detail) detail = '<div style="font-size:11px;color:var(--text-dim);margin-top:3px;">' + escapeHtml(g.detail) + '</div>';
            } else {
              label = '⚠️ ' + escapeHtml(g.event);
            }
            html += '<div class="log-entry" style="flex-direction:column;align-items:flex-start;">' +
              '<div style="display:flex;justify-content:space-between;width:100%;"><span class="event">' + label + '</span><span class="time">' + formatTime(dt) + '</span></div>' +
              detail + '</div>';
          }
          if (logEntries.length > 50) {
            html += '<div class="log-empty" style="margin-top:8px;">' + (logEntries.length - 50) + ' older entries not shown</div>';
          }
        }
      }

      document.getElementById('logStatus').innerHTML = statusHtml;
      document.getElementById('logList').innerHTML = html;
    })
    .withFailureHandler(function(err) {
      document.getElementById('logList').innerHTML =
        '<div class="log-empty">Failed to load log: ' + escapeHtml(err.message) + '</div>';
    })
    .clientGetLog();
}

// --- Helpers ---
function setStatus(s) {
  var dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + s;
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '') + ' show';
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

function showLoader(show) {
  document.getElementById('loader').className = show ? 'loader' : 'loader hidden';
}

function formatTime(d) {
  var now = new Date();
  var diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// --- Init ---
load();
