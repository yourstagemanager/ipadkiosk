# ============================================
# iPad Kiosk - lighttpd configuration
# ============================================
# Minimal config to serve the cached kiosk HTML
# on localhost for Safari to display.
# ============================================

server.document-root = "/var/www"
server.port = 8080

# Bind to localhost only
server.bind = "127.0.0.1"

# Mime types
mimetype.assign = (
  ".html" => "text/html",
  ".css"  => "text/css",
  ".jpg"  => "image/jpeg",
  ".jpeg" => "image/jpeg",
  ".png"  => "image/png",
  ".gif"  => "image/gif",
  ".ico"  => "image/x-icon"
)

# Default index
index-file.names = ( "index.html" )

# Logging (optional, disable to save disk)
# server.errorlog = "/var/log/lighttpd-error.log"
# accesslog.filename = "/var/log/lighttpd-access.log"
